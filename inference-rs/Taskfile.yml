version: '3'

# Sub-Taskfile for the Rust inference engine (inference-rs).
#
# Included from the root Taskfile as the `inference-rs` namespace, so tasks are invoked
# as `task inference-rs:<task>`. See https://taskfile.dev/docs/guide#including-other-taskfiles
#
# Paths are anchored with {{.ROOT_DIR}} (the repo root, i.e. the directory of the root
# Taskfile) so the tasks behave the same regardless of the working directory they are
# invoked from. {{.TASKFILE_DIR}} is this directory (inference-rs).

vars:
  # Where downloaded models live. Under ./data (gitignored) like utils/run_model.py, so
  # the reference C++ engine and the Rust engine share the same fixtures.
  MODELS_DIR: '{{.ROOT_DIR}}/data/models'

tasks:
  # Mirrors the root `poetry-install-utils` task. A child Taskfile can't depend on a task
  # in the parent, so the install target is redeclared here for the download helper.
  poetry-install-utils:
    internal: true
    dir: '{{.ROOT_DIR}}'
    cmds:
      - poetry install --only utils --no-root

  # Mirrors the root `poetry-install-black`. Redeclared here (a child Taskfile can't depend
  # on a parent task) so the lint tasks below stay self-contained.
  poetry-install-black:
    internal: true
    dir: '{{.ROOT_DIR}}'
    cmds:
      - poetry install --only black --no-root

  check:
    desc: Run the inference-rs checks with concise, task-focused feedback.
    summary: |
      An interactive quick check for the inference-rs project. Runs the checks (currently
      lint-black) in parallel and renders a compact live pass/fail summary instead of
      streaming every tool log. In a non-TTY (agentic) run it reports the first failure
      and stops the rest, so repair loops get fast, focused feedback.

      Add more checks by extending CHECKS in scripts/check.py.
    dir: '{{.ROOT_DIR}}'
    cmds:
      # Only stdlib is used, so no poetry env is needed to drive the checks themselves.
      - python3 {{.TASKFILE_DIR}}/scripts/check.py

  lint-black:
    desc: Check the styling of the inference-rs Python code with Black.
    deps: [poetry-install-black]
    dir: '{{.ROOT_DIR}}'
    cmds:
      # Self-contained duplicate of the root `lint-black`, scoped to this directory so the
      # inference-rs project checks only its own Python. Black still reads [tool.black]
      # (line-length 99) from the repo-root pyproject.toml.
      - |
        echo "poetry run black {{.TASKFILE_DIR}} --check --diff"
        if poetry run black {{.TASKFILE_DIR}} --check --diff; then
          echo "The inference-rs Python code formatting is correct.";
        else
          echo "";
          echo "Python code formatting issues detected.";
          echo "Run 'task inference-rs:lint-black-fix' to fix them.";
          echo "";
          exit 1;
        fi

  lint-black-fix:
    desc: Fix the styling of the inference-rs Python code with Black.
    deps: [poetry-install-black]
    dir: '{{.ROOT_DIR}}'
    cmds:
      - poetry run black {{.TASKFILE_DIR}} {{.CLI_ARGS}}

  test:
    desc: Run the inference-rs Rust tests (trace reader + tolerance comparator).
    summary: |
      Runs `cargo test` for the Rust crate. The unit tests are self-contained
      (synthetic in-memory traces); the real-trace integration test skips unless
      a trace has been recorded at inference-rs/artifacts/enfr.trace via
      `task inference-rs:translate-reference -- ... --trace`.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cargo test {{.CLI_ARGS}}

  lint-rust:
    desc: Check the formatting of the inference-rs Rust code with rustfmt.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        echo "cargo fmt --check"
        if cargo fmt --check; then
          echo "The inference-rs Rust code formatting is correct.";
        else
          echo "";
          echo "Rust code formatting issues detected.";
          echo "Run 'task inference-rs:lint-rust-fix' to fix them.";
          echo "";
          exit 1;
        fi

  lint-rust-fix:
    desc: Fix the formatting of the inference-rs Rust code with rustfmt.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cargo fmt {{.CLI_ARGS}}

  lint-docs:
    desc: Fail if src/tests reference the numbered design docs (build-process cruft).
    summary: |
      Keeps code comments free of "how this was built" references to the numbered
      design docs (01-build-plan.md, 04-finalize-plan.md, …). Forward pointers to
      future work are fine as `issues/NN-*.md` links, which are allowed.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        hits=$(grep -rEn '[0-9]{2}-[a-z-]+\.md' src tests | grep -v 'issues/' || true)
        if [ -n "$hits" ]; then
          echo "$hits";
          echo "";
          echo "Code references the numbered design docs (process/self-talk).";
          echo "Remove them; use an issues/NN-*.md TODO link for a forward pointer.";
          exit 1;
        fi
        echo "No design-doc references in code."

  download-model:
    desc: Download a production model from Remote Settings by language pair.
    summary: |
      Downloads the model, vocab, and lexical shortlist for a language pair from the
      Firefox production Remote Settings CDN, decompresses them, verifies their sha256
      hashes against the record, and writes a translator-cli decode config.

      The files land in data/models/{src}{trg}/ (e.g. data/models/enes/). Requires the
      poetry env (the `utils` group) for the shared pipeline download helpers.

      Example:
        task inference-rs:download-model -- en es
    deps: [poetry-install-utils]
    dir: '{{.ROOT_DIR}}'
    cmds:
      - >-
        PYTHONPATH=$(pwd) poetry run python -W ignore
        {{.TASKFILE_DIR}}/scripts/download_model.py
        --models-dir {{.MODELS_DIR}}
        {{.CLI_ARGS}}

  translate:
    desc: Translate text with the Rust inference-rs engine (greedy, int8shiftAlphaAll).
    summary: |
      Runs the Rust engine on a downloaded model. Resolves the model + vocab for the
      language pair from its decode config, then calls the crate via `cargo run` (so a
      build is dispatched as needed) and pipes the text in.

      Requires the model to be downloaded (`task inference-rs:download-model -- <src> <trg>`).
      Text may be passed with --text or piped over stdin (translated line by line).

      The lexical shortlist is off by default (it lowers quality on short inputs); pass
      --shortlist to enable it.

      Examples:
        task inference-rs:translate -- en es --text "Hello world!"
        task inference-rs:translate -- en es --shortlist --text "Hello world!"
        echo "Hello world!" | task inference-rs:translate -- en es
    dir: '{{.ROOT_DIR}}'
    cmds:
      # Stdlib-only wrapper (no poetry env needed); it shells out to `cargo run`.
      - python3 {{.TASKFILE_DIR}}/scripts/translate.py {{.CLI_ARGS}}

  perf:
    desc: Measure engine perf (TTFT + tok/s), or record a samply Firefox profile.
    summary: |
      Pre-builds the release binary (build excluded from timing), then translates a
      corpus N times (single-threaded) and reports median/IQR of time-to-first-token
      and steady-state tokens/second from the CLI's --timing spans.

      Compare build variants with --features (e.g. lean-embed). Pass --samply to record
      a Firefox Profiler .json.gz under artifacts/ instead of timing.

      Requires the model downloaded (task inference-rs:download-model -- <src> <trg>);
      --samply additionally needs `samply` on PATH.

      Examples:
        task inference-rs:perf -- en fr
        task inference-rs:perf -- en fr --features lean-embed
        task inference-rs:perf -- en fr --samply
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/perf.py {{.CLI_ARGS}}

  build-spm-encode:
    desc: Build the upstream spm_encode binary from the vendored sentencepiece.
    summary: |
      The reference tokenizer, used to generate golden ids for the tokenizer oracle
      (task inference-rs:spm-goldens). marian builds only the sentencepiece static lib,
      so this configures a standalone build with the CLI tools enabled. The binary
      lands at inference/build-spm/src/spm_encode.
    dir: '{{.ROOT_DIR}}'
    cmds:
      - cmake -S inference/marian-fork/src/3rd_party/sentencepiece -B inference/build-spm
          -DCMAKE_BUILD_TYPE=Release -DSPM_ENABLE_SHARED=OFF -DSPM_BUILD_LIBRARY_ONLY=OFF
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - cmake --build inference/build-spm --target spm_encode -j4

  spm-goldens:
    desc: Regenerate committed tokenizer goldens (corpora/*.ids) with spm_encode.
    summary: |
      Re-tokenizes each committed corpus with the reference spm_encode + the en-fr vocab
      and writes the golden ids the tokenizer oracle (tests/spm_oracle.rs) checks against.
      Run after changing a corpus. Requires task inference-rs:build-spm-encode and the
      downloaded vocab.
    dir: '{{.TASKFILE_DIR}}'
    vars:
      SPM: '{{.ROOT_DIR}}/inference/build-spm/src/spm_encode'
      VOCAB: '{{.MODELS_DIR}}/enfr/vocab.enfr.spm'
      ENJA_SRC: '{{.MODELS_DIR}}/enja/srcvocab.enja.spm'
      ENJA_TRG: '{{.MODELS_DIR}}/enja/trgvocab.enja.spm'
    cmds:
      - '{{.SPM}} --model={{.VOCAB}} --output_format=id < corpora/dev-en.txt > corpora/dev-en.ids'
      - '{{.SPM}} --model={{.VOCAB}} --output_format=id < corpora/nllb-en-fr.txt > corpora/nllb-en-fr.ids'
      # Split-vocab (CJK) goldens: English through the source vocab, Japanese through the target vocab.
      - '{{.SPM}} --model={{.ENJA_SRC}} --output_format=id < corpora/dev-en.txt > corpora/dev-en.enja-src.ids'
      - '{{.SPM}} --model={{.ENJA_TRG}} --output_format=id < corpora/dev-ja.txt > corpora/dev-ja.enja-trg.ids'

  sample-corpus:
    desc: Sample a diverse source corpus from NLLB/CCMatrix and cache a seeded subset.
    summary: |
      Streams the CCMatrix bitext (the mined data behind NLLB) for a pair, caps the
      download at ~500 MB, reservoir-samples a seeded subset of single source sentences,
      and writes it under corpora/ with a sha256. The full multi-GB file is never
      downloaded or committed. The prefix is margin-biased (a single gzip can't be seeked).

      Example:
        task inference-rs:sample-corpus -- en fr
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/sample_corpus.py {{.CLI_ARGS}}

  parity:
    desc: Report greedy exact-match rate of inference-rs vs translator-cli over a corpus.
    summary: |
      Feeds a corpus (one pre-split sentence per line) through both engines and reports
      the greedy exact-match rate plus the mismatches. Shortlist off by default (the
      production baseline); pass --shortlist to enable it on both sides.

      Requires the model downloaded (task inference-rs:download-model -- <src> <trg>) and
      the reference engine built (task inference-build).

      Examples:
        task inference-rs:parity -- en fr
        task inference-rs:parity -- en es --limit 10
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/parity.py {{.CLI_ARGS}}

  translate-reference:
    desc: Translate text with the reference C++ translator-cli (to validate the Rust engine against).
    summary: |
      Runs the existing C++ inference engine so the Rust implementation can be validated
      against a known-good reference. Requires the engine to be built natively on arm64
      (`task inference-build`) and the model to be downloaded
      (`task inference-rs:download-model -- <src> <trg>`).

      Arguments are passed through to the script (see --help):
        task inference-rs:translate-reference -- --help

      Examples:
        task inference-rs:translate-reference -- en es --text "Hello World"
    dir: '{{.ROOT_DIR}}'
    cmds:
      # No --models-dir/--translator-cli here: the script's relative defaults resolve
      # against this task's working dir (the repo root). The engine runs natively on the
      # host (arm64, no Docker), so relative defaults just work.
      - >-
        poetry run python -W ignore
        {{.TASKFILE_DIR}}/scripts/translate_reference.py
        {{.CLI_ARGS}}
