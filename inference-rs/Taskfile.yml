version: '3'

# Sub-Taskfile for the Rust inference engine (inference-rs), included from the root
# Taskfile under the `rs` namespace — tasks are invoked as `task rs:<task>` from
# anywhere in the repo. {{.ROOT_DIR}} is the repo root, {{.TASKFILE_DIR}} is this
# directory; paths are anchored to them so tasks work from any working directory.

vars:
  # Downloaded models, under ./data (gitignored) — shared by the C++ and Rust engines.
  MODELS_DIR: '{{.ROOT_DIR}}/data/models'

tasks:
  # A child Taskfile can't depend on a parent task, so the poetry installs the tasks
  # below need are redeclared here.
  poetry-install-utils:
    internal: true
    dir: '{{.ROOT_DIR}}'
    cmds:
      - poetry install --only utils --no-root

  poetry-install-black:
    internal: true
    dir: '{{.ROOT_DIR}}'
    cmds:
      - poetry install --only black --no-root

  check:
    desc: Run the inference-rs checks with concise, task-focused feedback.
    summary: |
      Runs the inference-rs checks in parallel with a compact live pass/fail summary.
      In a non-TTY run it stops at the first failure. Extend CHECKS in scripts/check.py.
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/check.py

  lint-black:
    desc: Check the styling of the inference-rs Python code with Black.
    deps: [poetry-install-black]
    dir: '{{.ROOT_DIR}}'
    cmds:
      # Scoped to this directory so inference-rs checks only its own Python; Black reads
      # its config from the repo-root pyproject.toml.
      - |
        echo "poetry run black {{.TASKFILE_DIR}} --check --diff"
        if poetry run black {{.TASKFILE_DIR}} --check --diff; then
          echo "The inference-rs Python code formatting is correct.";
        else
          echo "";
          echo "Python code formatting issues detected.";
          echo "Run 'task rs:lint-black-fix' to fix them.";
          echo "";
          exit 1;
        fi

  lint-black-fix:
    desc: Fix the styling of the inference-rs Python code with Black.
    deps: [poetry-install-black]
    dir: '{{.ROOT_DIR}}'
    cmds:
      - poetry run black {{.TASKFILE_DIR}} {{.CLI_ARGS}}

  test:
    desc: Run the workspace Rust tests (engine, oracle harness, and CLI).
    summary: |
      Runs `cargo test` across the three crates. The engine runs with `fast,net` so the
      gemmology parity and model-management tests are covered. The oracle's real-trace
      parity tests skip unless a trace was recorded (task rs:translate-reference -- … --trace).
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cargo test -p fxtranslate --features fast,net {{.CLI_ARGS}}
      - cargo test -p fxtranslate-oracle {{.CLI_ARGS}}
      - cargo test -p fxtranslate-cli {{.CLI_ARGS}}

  lint-rust:
    desc: Check the formatting of the inference-rs Rust code with rustfmt.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        echo "cargo fmt --check"
        if cargo fmt --check; then
          echo "The inference-rs Rust code formatting is correct.";
        else
          echo "";
          echo "Rust code formatting issues detected.";
          echo "Run 'task rs:lint-rust-fix' to fix them.";
          echo "";
          exit 1;
        fi

  lint-rust-fix:
    desc: Fix the formatting of the inference-rs Rust code with rustfmt.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cargo fmt {{.CLI_ARGS}}

  lint-docs:
    desc: Fail if src/tests reference the numbered design docs (build-process cruft).
    summary: |
      Keeps code comments free of "how this was built" references to the numbered
      design docs under notes/ (01-build-plan.md, 04-finalize-plan.md, …).
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        hits=$(grep -rEn '[0-9]{2}-[a-z-]+\.md' crates || true)
        if [ -n "$hits" ]; then
          echo "$hits";
          echo "";
          echo "Code references the numbered design docs (process/self-talk). Remove them.";
          exit 1;
        fi
        echo "No design-doc references in code."

  lint-ci:
    desc: Fail if the GitHub CI workflow drifts from the rs:check check list.
    summary: |
      Cross-checks .github/workflows/inference-rs.yml against the CHECKS list in
      scripts/check.py so `task rs:check` and CI can't silently diverge. The heavy C++
      inference-build is exempt (it stays local / taskcluster).
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/lint_ci.py

  download-model:
    desc: Download a production model from Remote Settings by language pair.
    summary: |
      Downloads the model, vocab, and lexical shortlist for a language pair from the
      Firefox production Remote Settings CDN, verifies their sha256 hashes, and writes a
      translator-cli decode config into data/models/{src}{trg}/.

      Example:
        task rs:download-model -- en es
    deps: [poetry-install-utils]
    dir: '{{.ROOT_DIR}}'
    cmds:
      - >-
        PYTHONPATH=$(pwd) poetry run python -W ignore
        {{.TASKFILE_DIR}}/scripts/download_model.py
        --models-dir {{.MODELS_DIR}}
        {{.CLI_ARGS}}

  translate:
    desc: Translate text with the Rust inference-rs engine (greedy, int8shiftAlphaAll).
    summary: |
      Runs the Rust engine on a downloaded model (task rs:download-model -- <src> <trg>).
      Text is passed with --text or piped over stdin (translated line by line). The
      lexical shortlist is off by default (it lowers quality on short inputs); --shortlist
      enables it.

      Examples:
        task rs:translate -- en es --text "Hello world!"
        task rs:translate -- en es --shortlist --text "Hello world!"
        echo "Hello world!" | task rs:translate -- en es
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/translate.py {{.CLI_ARGS}}

  perf:
    desc: Measure engine perf (TTFT + tok/s), or record a samply Firefox profile.
    summary: |
      Translates a corpus N times (single-threaded, build excluded from timing) and
      reports the median and IQR of time-to-first-token (TTFT) and steady-state
      tokens/second. Compare build variants with --features. Pass --samply to record a
      Firefox Profiler .json.gz under artifacts/ instead of timing (needs `samply` on PATH).

      Requires the model downloaded (task rs:download-model -- <src> <trg>).

      Examples:
        task rs:perf -- en fr
        task rs:perf -- en fr --features lean-embed
        task rs:perf -- en fr --samply
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/perf.py {{.CLI_ARGS}}

  release:
    desc: Release build + binary-size characterization + validation.
    summary: |
      Builds the release artifacts and reports their size (optionally a `cargo bloat`
      breakdown). Unless --skip-validation, it checks the release binary is lean
      (instrumentation/dhat off) and produces the same output as the debug build, and
      reports the translator-cli parity rate. Validation needs the model downloaded and,
      for the parity number, the C++ oracle built.

      Examples:
        task rs:release
        task rs:release -- --pair en ru
        task rs:release -- --bloat
        task rs:release -- --skip-validation
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/release_build.py {{.CLI_ARGS}}

  fxtranslate:
    desc: Run the batteries-included fxtranslate CLI (discover/download/cache + translate).
    summary: |
      Builds and runs the fxtranslate binary. It discovers models from Remote Settings,
      downloads+caches them under the platform-specific {cache}/fxtranslate directory,
      and translates. Examples:
        task rs:fxtranslate -- list en
        echo "Hello world." | task rs:fxtranslate -- translate en es
        task rs:fxtranslate -- translate en es "Hello world."
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cargo run --quiet --release -p fxtranslate-cli -- {{.CLI_ARGS}}

  make-blocks:
    desc: Group the NLLB corpus into paragraph-sized blocks for the block benchmark.
    summary: |
      Groups the committed one-sentence-per-line NLLB corpus into paragraph-sized blocks
      (grouping only, no sentence splitting) for the block benchmark. Deterministic.

      Example:
        task rs:make-blocks
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/make_blocks.py {{.CLI_ARGS}}

  build-spm-encode:
    desc: Build the upstream spm_encode binary from the vendored sentencepiece.
    summary: |
      Builds the reference tokenizer used to generate tokenizer goldens (task
      rs:spm-goldens). marian builds only the sentencepiece static lib, so this does a
      standalone build with the CLI tools enabled, producing inference/build-spm/src/spm_encode.
    dir: '{{.ROOT_DIR}}'
    cmds:
      - cmake -S inference/marian-fork/src/3rd_party/sentencepiece -B inference/build-spm
          -DCMAKE_BUILD_TYPE=Release -DSPM_ENABLE_SHARED=OFF -DSPM_BUILD_LIBRARY_ONLY=OFF
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - cmake --build inference/build-spm --target spm_encode -j4

  spm-goldens:
    desc: Regenerate committed tokenizer goldens (corpora/*.ids) with spm_encode.
    summary: |
      Re-tokenizes each committed corpus with the reference spm_encode + the en-fr vocab
      and writes the golden ids the tokenizer oracle (tests/spm_oracle.rs) checks against.
      Run after changing a corpus. Requires task rs:build-spm-encode and the
      downloaded vocab.
    dir: '{{.TASKFILE_DIR}}'
    vars:
      SPM: '{{.ROOT_DIR}}/inference/build-spm/src/spm_encode'
      VOCAB: '{{.MODELS_DIR}}/enfr/vocab.enfr.spm'
      ENJA_SRC: '{{.MODELS_DIR}}/enja/srcvocab.enja.spm'
      ENJA_TRG: '{{.MODELS_DIR}}/enja/trgvocab.enja.spm'
    cmds:
      - '{{.SPM}} --model={{.VOCAB}} --output_format=id < corpora/dev-en.txt > corpora/dev-en.ids'
      - '{{.SPM}} --model={{.VOCAB}} --output_format=id < corpora/nllb-en-fr.txt > corpora/nllb-en-fr.ids'
      # Split-vocab (CJK) goldens: English through the source vocab, Japanese through the target vocab.
      - '{{.SPM}} --model={{.ENJA_SRC}} --output_format=id < corpora/dev-en.txt > corpora/dev-en.enja-src.ids'
      - '{{.SPM}} --model={{.ENJA_TRG}} --output_format=id < corpora/dev-ja.txt > corpora/dev-ja.enja-trg.ids'

  sample-corpus:
    desc: Sample a diverse source corpus from NLLB/CCMatrix and cache a seeded subset.
    summary: |
      Streams the CCMatrix bitext (the mined data behind NLLB) for a pair, caps the
      download at ~500 MB, samples a seeded subset of source sentences, and writes it
      under corpora/ with a sha256. The full multi-GB file is never committed.

      Example:
        task rs:sample-corpus -- en fr
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/sample_corpus.py {{.CLI_ARGS}}

  parity:
    desc: Report greedy exact-match rate of inference-rs vs translator-cli over a corpus.
    summary: |
      Feeds a corpus (one pre-split sentence per line) through both engines and reports
      the greedy exact-match rate plus the mismatches. Shortlist off by default (the
      production baseline); pass --shortlist to enable it on both sides.

      Requires the model downloaded (task rs:download-model -- <src> <trg>) and
      the reference engine built (task inference-build).

      Examples:
        task rs:parity -- en fr
        task rs:parity -- en es --limit 10
    dir: '{{.ROOT_DIR}}'
    cmds:
      - python3 {{.TASKFILE_DIR}}/scripts/parity.py {{.CLI_ARGS}}

  translate-reference:
    desc: Translate text with the reference C++ translator-cli (to validate the Rust engine against).
    summary: |
      Runs the existing C++ inference engine so the Rust implementation can be validated
      against a known-good reference. Requires the engine to be built natively
      (`task inference-build`) and the model to be downloaded
      (`task rs:download-model -- <src> <trg>`).

      Arguments are passed through to the script (see --help):
        task rs:translate-reference -- --help

      Examples:
        task rs:translate-reference -- en es --text "Hello World"
    dir: '{{.ROOT_DIR}}'
    cmds:
      # Runs from the repo root so the script's relative model/binary defaults resolve.
      - >-
        poetry run python -W ignore
        {{.TASKFILE_DIR}}/scripts/translate_reference.py
        {{.CLI_ARGS}}
