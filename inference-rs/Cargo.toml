[package]
name = "inference-rs"
version = "0.1.0"
edition = "2021"
description = "Rust reimplementation of the Firefox Translations inference engine, validated against the C++ translator-cli."

[dependencies]
# Heap profiler, wired in only under the `dhat-heap` feature so normal builds
# carry no allocator override and no extra dependency (issue 09/11).
dhat = { version = "0.3", optional = true }

[features]
# Enable dhat heap profiling: installs the dhat global allocator and writes a
# dhat JSON report. Off by default. `cargo build --features dhat-heap`.
dhat-heap = ["dep:dhat"]

# Drop the resident dequantized-f32 embedding tables: dequantize embedding rows
# on demand and run the output projection full-vocab in int8. Large load/retained
# memory win; a hot-path change whose perf is not yet measured, so it is opt-in
# pending a perf harness. `cargo build --features lean-embed`. See
# 06-memory-approach.md §7.
lean-embed = []

# Route the shifted int8 affine (`ops::intgemm_affine`: the transformer affines,
# and the full-vocab output projection under `lean-embed`) through the vendored
# gemmology i8mm SIMD kernel instead of the scalar Rust loop. Requires a C++17
# toolchain and the gemmology/xsimd submodules; aarch64 only. Numerically
# identical to the scalar path (see tests/gemm_parity.rs). The perf config is
# `--features lean-embed,gemmology`. See 08-perf-analysis.md.
gemmology = []

[build-dependencies]
# Compiles src/gemmology_shim.cpp, but only under the `gemmology` feature (build.rs
# early-returns otherwise). Build-only; no runtime dependency.
cc = "1"
