[package]
name = "fxtranslate"
version = "0.1.0"
edition = "2021"
description = "Rust reimplementation of the Firefox Translations inference engine, validated against the C++ translator-cli."
license = "MPL-2.0"

[lib]
name = "fxtranslate"
path = "src/lib.rs"

[dependencies]
# Memory-map the model file (opt-in `--mmap`): weight tensors become views into
# the mapping instead of owned heap copies. See issues/19-settled-rss-allocator.md.
memmap2 = "0.9"

[features]
# Portable pure-Rust scalar by default, so the library builds on any target
# (x86, wasm, non-aarch64) with no C++ toolchain. Opt into speed with `fast`.
default = []

# The fast, production-shaped compute config: the lean int8 embeddings + output
# projection (`lean-embed`) run through the gemmology i8mm SIMD kernel
# (`gemmology`). ~0.96x the marian-fork throughput (see 08/09/10 docs). Requires a
# C++17 toolchain and the vendored gemmology/xsimd headers — native aarch64-only.
# The jemalloc/dhat allocators are a binary concern and live in the
# `fxtranslate-oracle` dev crate, not here.
fast = ["lean-embed", "gemmology"]

# Drop the resident dequantized-f32 embedding tables: dequantize embedding rows
# on demand and run the output projection full-vocab in int8. Large load/retained
# memory win and, with `gemmology`, a throughput win too. See 06-memory-approach.md §7.
lean-embed = []

# Route the shifted int8 affine (`ops::intgemm_affine`: the transformer affines,
# and the full-vocab output projection under `lean-embed`) through the vendored
# gemmology i8mm SIMD kernel instead of the scalar Rust loop. Requires a C++17
# toolchain and the vendored gemmology/xsimd headers; aarch64 only. Numerically
# identical to the scalar path (see tests/gemm_parity.rs). See 08-perf-analysis.md.
gemmology = []

[build-dependencies]
# Compiles src/gemmology_shim.cpp, but only under the `gemmology` feature (build.rs
# early-returns otherwise). Build-only; no runtime dependency.
cc = "1"
