name: inference-rs

# CI for the inference-rs Rust engine.
#
# Each job runs the same `task rs:<name>` that `task rs:check` runs locally (the
# CHECKS list in inference-rs/scripts/check.py), so the Taskfile stays the single
# source of truth for *how* each check runs and CI only declares *which* ones and
# installs the tools each needs. The `lint-ci` job guards the two against drift.
#
# inference-build (the C++ marian reference engine) is intentionally NOT built
# here — it stays in local dev / taskcluster. It is listed as CI-exempt in
# inference-rs/scripts/lint_ci.py.

on:
  push:
    branches: [inference-rs, main]
    paths:
      - 'inference-rs/**'
      - '.github/workflows/inference-rs.yml'
  pull_request:
    paths:
      - 'inference-rs/**'
      - '.github/workflows/inference-rs.yml'

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: inference-rs-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint-ci:
    # Cross-checks this workflow against check.py's CHECKS. Pure stdlib Python
    # (preinstalled on the runner), so it needs nothing but the repo + task.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task rs:lint-ci

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task rs:lint-rust

  lint-black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      # `task rs:lint-black` runs `poetry install --only black`; poetry must be on PATH.
      - name: Install Poetry
        run: pipx install poetry
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task rs:lint-black

  test:
    # Run the workspace tests on both SIMD arches: ARM exercises the gemmology
    # i8mm kernel, x86 the AVX2 kernel. g++ (for the gemmology shim) ships in the
    # runner image. Model-dependent tests skip when no model is present; the
    # marian-oracle parity tests skip without a recorded trace.
    #
    # FXTRANSLATE_REQUIRE_SIMD makes a silent scalar fallback a hard failure:
    # build.rs panics if it can't compile the SIMD shim for the target, and
    # gemm_parity fails if the live backend is "scalar". So a green job proves the
    # real SIMD kernel ran — it can't quietly degrade to the portable path.
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: arm-i8mm, runs-on: ubuntu-24.04-arm }
          - { label: x86-avx2, runs-on: ubuntu-latest }
    env:
      FXTRANSLATE_REQUIRE_SIMD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: inference-rs
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Which int8 instructions this runner can actually execute — decides what a
      # VNNI/CPUID-dispatch backend could be tested against here.
      - name: Probe CPU int8 features
        if: matrix.label == 'x86-avx2'
        run: grep -m1 '^flags' /proc/cpuinfo | tr ' ' '\n' | grep -E 'avx2|avx512|vnni|^sse' | sort -u | paste -sd' ' -
      - run: task rs:test
      # Surface the kernel that actually ran (i8mm+neon64 / avx2) in the log, as
      # positive proof rather than just the absence of a failure.
      - name: Report gemm SIMD backend
        working-directory: inference-rs
        run: >-
          cargo test -p fxtranslate --features fast --test gemm_parity
          simd_backend_is_live_when_required -- --nocapture --exact

  test-portable:
    # The "runs everywhere" contract: the pure-Rust scalar kernel must build with
    # no C++ toolchain and pass. `fast,portable` keeps the gemmology feature (so the
    # parity test still compiles) while `portable` forces the scalar stub;
    # FXTRANSLATE_REQUIRE_SCALAR asserts the build really did fall back to scalar.
    # No setup-task / g++ — this is the toolchain-less path.
    runs-on: ubuntu-latest
    env:
      FXTRANSLATE_REQUIRE_SCALAR: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: inference-rs
      - name: Test the portable scalar kernel
        working-directory: inference-rs
        run: cargo test -p fxtranslate --features fast,portable -- --nocapture
